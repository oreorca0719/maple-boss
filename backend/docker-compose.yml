version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    ports:
      - "8000:8000"
    environment:
      APP_ENV: development
      NEXON_API_KEY: ${NEXON_API_KEY}
      AWS_REGION: ${AWS_REGION:-ap-northeast-2}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      DYNAMODB_TABLE_NAME: ${DYNAMODB_TABLE_NAME:-maple-boss-scheduler}
      DYNAMODB_ENDPOINT_URL: ${DYNAMODB_ENDPOINT_URL:-}
      APP_SECRET_KEY: ${APP_SECRET_KEY:-dev-secret}
      APP_CORS_ORIGINS: ${APP_CORS_ORIGINS:-http://localhost:3000}
    env_file:
      - .env
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
    volumes:
      - ./app:/app/app  # 로컬 소스 hot-reload
